<html lang="en">

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Title -->
    <title>Opésh Overseas | Premier B2B Sourcing & Global Export House</title>
    
    <!-- Meta Description for SEO -->
    <meta name="description" content="Gurgaon-based premier export house connecting India's finest Ayurveda, handcrafted textiles, and heritage artisanry with global buyers. Strict compliance & direct-to-source quality." />

    <!-- Preconnect to external assets for page load speed -->

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://res.cloudinary.com">

    <!-- Combined Fonts Stylesheet -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&display=swap" rel="stylesheet">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://opeshoverseas.com/" />
    <meta property="og:title" content="Opésh Overseas | Premier B2B Sourcing & Global Export House" />
    <meta property="og:description" content="Gurgaon-based premier export house connecting India's finest Ayurveda, handcrafted textiles, and heritage artisanry with global buyers. Strict compliance & direct-to-source quality." />
    <meta property="og:image" content="https://opeshoverseas.com/assets/about.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://opeshoverseas.com/" />
    <meta property="twitter:title" content="Opésh Overseas | Premier B2B Sourcing & Global Export House" />

    <meta property="twitter:image" content="https://opeshoverseas.com/assets/about.png" />

    <!-- SPA Path Restoration Script -->
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&') 
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
